<div class="task-form">
  <h2>Add New Task</h2>

  <form [formGroup]="taskForm" (ngSubmit)="submitTask()">
    <div class="form-group">
      <label for="title">Title</label>
      <input id="title" type="text" formControlName="title" />
      <small class="error-text" *ngIf="taskForm.get('title')?.invalid && taskForm.get('title')?.touched">
        Title must be at least 3 characters
      </small>
    </div>

    <div class="form-group">
      <label for="description">Description</label>
      <textarea id="description" formControlName="description"></textarea>
      <small class="error-text" *ngIf="taskForm.get('description')?.invalid && taskForm.get('description')?.touched">
        Description must be at least 5 characters
      </small>
    </div>

    <div class="form-group">
      <label for="status">Status</label>
      <select id="status" formControlName="status">
        <option value="Todo">Todo</option>
        <option value="In Progress">In Progress</option>
        <option value="Done">Done</option>
      </select>
    </div>

    <button class="submit-btn" type="submit">Add Task</button>
  </form>
</div>
